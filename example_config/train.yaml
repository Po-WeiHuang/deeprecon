
{% set base_dir = "/data/snoplus2/weiiiii/" %}
{% set train_files = (base_dir,"electron_bismsb_0dot5_10/Ntuple/Bronze/*ntuple.root" ) | path_join %}
{% set val_files = (base_dir,"electron_bismsb_0dot5_10/ValNtuple/Bronze/*ntuple.root" ) | path_join %}

model:
  class_path: model.hitsrecon.SNOPosEnegyRecon
  init_args:
    {% set n_pmts = 9728 %}
    {% set d_model = 64 %}
    num_heads: 4
    num_layers: 4


train:
      
  seed: 801
  checkpoint_dir: {{ checkpoint_dir }}
  device: &device cuda
  train_dataloader: &train_dataloader
    class_path: torch.utils.data.DataLoader
    init_args: &train_dataloader_init_args
      dataset: &train_dataset
        class_path: utils.datasets.PosEnergyRecoDataset
        init_args: &train_dataset_init_args
          file_paths: {{ train_files }}
          tree_name: "output"
          truth_expressions: ["mcPosx", "mcPosy", "mcPosz", "mcPosr", "mcEdepQuenched","mctime1"]
          buffer_size: 10000
          cache: true
      batch_size: 2048
      num_workers: 32
      shuffle: false
      pin_memory: true

  val_dataloader:
    <<: *train_dataloader
    init_args:
      #dataset: 
        <<: *train_dataset
        init_args:
          << : *train_dataset_init_args
          file_paths: {{ val_files }}
        <<: *train_dataloader_init_args
        batch_size: 8192
        num_workers: 8
  val_num_steps: 10000
  num_steps: &num_steps 500000

  optimiser: 
    class_path: torch.optim.Adam
    init_args:
      lr: 5e-4
      betas: [0.9, 0.98]
      eps: 1e-9

    scheduler:
        class_path: torch.optim.lr_scheduler.OneCycleLR
        init_args:
            max_lr: 1e-3
            total_steps: *num_steps
    val_norm: false
    loss_fn: &train_loss_fn
        class_path: metrics.recon.ResolutionLoss
    val_metric:
        class_path: metrics.metrics.BatchedMetric
        init_args:
            metric_fn: *train_loss_fn

    max_grad_norm: 1    