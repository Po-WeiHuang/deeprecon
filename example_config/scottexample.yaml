# {% set base_dir = "/data/snoplus2/degraw/laserball" %}
{% set base_dir = "/data/snoplus2/degraw/laserball/mlpca/" %}
{% set base_dir = "/data/snoplus2/degraw/insitu_bipo/calibration/Po210" %}
{% set train_dset_path = (base_dir, "train_dset.root") | path_join %}
{% set val_dset_path = (base_dir, "val_dset.root") | path_join %}
{% set checkpoint_dir = (base_dir, "checkpoints") | path_join | model_save_directory%}

model:
    class_path: deepsno.models.hit_time_autoencoder.HitTimeAutoEncoder
    # class_path: deepsno.models.hit_time_autoencoder.JustTimeWalk
    init_args:
        c_av: &c_av 183.5
        c_water: 217.55
        fix_c: true
        c_av_grad: 0.0
        av_radius: 6060.5
        dset: &dset_path {{ train_dset_path }}
        # min_occupancy: 50e-6
        # max_occupancy: 300e-6
        min_occupancy: 60e-6
        max_occupancy: 190e-6
        # min_occupancy: 80e-6
        # max_occupancy: 220e-6
        norm_dict:
            time_scale: &time_scale 300
            position_scale: &position_scale 6000
            qhs_scale: &qhs_scale 200
        position_reconstructor:
            {% set n_pmts = 9728 %}
            {% set d_model = 64 %}
            class_path: deepsno.models.position_reco.PositionReco
            init_args:
                predict_time: true
                n_pmts: {{ n_pmts }}
                d_model: {{ d_model }}
                nhead: 4
                dim_feedforward: 128
                num_layers: 6
                dropout: 0.1
                hit_time_embedding_dim: 512
            # class_path: deepsno.models.position_reco.ConstantPosition
            # init_args:
            #     init_pos: [0, 0, 0, 0]
        time_walk:
            class_path: deepsno.models.hit_time_autoencoder.ExpTimeWalk
            init_args:
                n_pmts: {{ n_pmts }}
                a_init: &a_init 0.021
                b_init: &b_init 0.075
                c_init: &c_init -0.003
                d_init: &d_init 0.0
                b_beta: 10
                c_beta: 10
                enable_grad_term: false
        # time_walk:
        #     class_path: deepsno.models.hit_time_autoencoder.InterPtsTimeWalk
        #     init_args:
        #         qhs_hist: {{ (base_dir , "pmt_qhs_hist.pkl") | path_join }}
        #         qhs_scale: *qhs_scale
        #         min_occupancy: 1000

train:
    seed: 783
    profile: false
    checkpoint_dir: {{ checkpoint_dir }}
    device: &device cuda
    train_dataset: &train_dataset
        class_path: &dataset_class_path deepsno.data.datasets.HitTimeAEDataset
        init_args: &train_dataset_init_args
            uproot_dataset: &uproot_dataset
                class_path: deepsno.data.datasets.ChunkedUprootDataset
                init_args: &uproot_dataset_init_args
                    path: {{ train_dset_path }}
                    condor_scratch: true
                    chunk_size: 10000
                    buffer_size: 100000
                    cut: &cut "(sqrt(posx**2 + posy**2 + posz**2) < 4000) & (npmt_id > 4)"
                    # cut: 'posz > -2000'
            context_len: 256

    val_dataset:
        <<: *train_dataset
        init_args:
            <<: *train_dataset_init_args
            uproot_dataset:
                <<: *uproot_dataset
                # class_path: deepsno.data.datasets.ChunkedUprootDataset
                init_args:
                    <<: *uproot_dataset_init_args
                    path: {{ val_dset_path }}

    batch_size: &batch_size 2048 
    # batch_size: &batch_size 512 
    val_batch_size: &val_batch_size 8192
    val_num_steps: 5000
    shuffle: false 
    num_workers: &num_workers 20
    num_steps: &num_steps 500000
    # num_steps: &num_steps 100000

    optimizer:
        class_path: torch.optim.Adam
        init_args:
            lr: 5e-4
            betas: [0.9, 0.98]
            eps: 1e-9
    scheduler:
        class_path: torch.optim.lr_scheduler.OneCycleLR
        init_args:
            max_lr: 1e-3
            total_steps: *num_steps
        # class_path: torch.optim.lr_scheduler.ExponentialLR
        # init_args:
        #     gamma: 0.9999
    val_norm: false
    loss_fn: &train_loss_fn
        class_path: deepsno.metrics.hit_time_autoencoder.TimeResidualLoss
        init_args:
            # mu: 4.312
            # sigma: 3.335
            # a: 5.051
            # b: 650.5e-3

            mu: 3.23
            sigma: 3.5
            a: 3.71
            b: 0.436
            offset: 0
        # class_path: deepsno.metrics.hit_time_autoencoder.MaskedMSELoss

    train_unnorm: true


    val_metric:
        class_path: deepsno.metrics.metrics.BatchedMetric
        init_args:
            metric_fn: *train_loss_fn

    max_grad_norm: 1
    metric_monitors:
        # - class_path: deepsno.metrics.metric_monitor.TimeResidualMonitor
        #   init_args:
        #       min_residual: -50
        #       max_residual: 200
        #       bins: 200
        #       effective_c: 200
        #       offset: *hit_time_mean
        # - class_path: deepsno.metrics.metric_monitor.EffectiveCMonitor
        #   init_args:
        #       position_scale: *position_scale
        #       time_scale: *time_scale